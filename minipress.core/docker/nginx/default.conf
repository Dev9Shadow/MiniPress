server {
    listen 80;
    server_name _;
    root /var/www/html/minipress.appli/public;

    # API -> service api
    location /api/ {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/minipress.appli/public/api.php;
        fastcgi_param PATH_INFO $uri;
    }

    # Admin + login/logout -> service admin
    location ~ ^/(admin|login|logout) {
        include fastcgi_params;
        fastcgi_pass admin:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/minipress.appli/public/admin.php;
        fastcgi_param PATH_INFO $uri;
    }

    # Webapp statique MiniPress.web (deposer le build dans ./web)
    location / {
        root /var/www/html/web;
        try_files $uri $uri/ /index.html;
    }
}
